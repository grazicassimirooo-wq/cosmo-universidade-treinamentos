<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Cosmo Universidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; }
    </style>
</head>
<body class="text-white flex items-center justify-center h-screen p-4">
    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-md border-t-4 border-t-indigo-500">
        <h1 class="text-3xl font-bold text-center mb-2 text-indigo-400">Cosmo</h1>
        <p class="text-slate-400 text-center mb-8 font-light text-sm uppercase tracking-widest">Recuperar Senha</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1 ml-1">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail cadastrado" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-indigo-500 transition-all">
            </div>
            
            <button onclick="recuperarSenha()" id="btnRecuperar" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-lg font-bold transition-all shadow-lg shadow-indigo-500/20 mt-4">
                Enviar Link de Recuperação
            </button>
            
            <a href="login.html" class="block text-center text-slate-400 hover:text-indigo-400 text-sm mt-4 transition-colors">
                ← Voltar para o Login
            </a>
        </div>
        
        <p id="msg" class="text-sm mt-6 text-center h-auto"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1rc6WLlLHvdizZmQB-FBzeAmbrz0jRFs",
            authDomain: "cosmo-universidade.firebaseapp.com",
            projectId: "cosmo-universidade",
            storageBucket: "cosmo-universidade.firebasestorage.app",
            messagingSenderId: "712049564091",
            appId: "1:712049564091:web:b7dc33e1978c0dec150c9e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.recuperarSenha = function() {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btnRecuperar');

            if(!email) {
                msg.innerHTML = '<span class="text-red-400">Por favor, preencha seu e-mail!</span>';
                return;
            }

            // Validação básica de e-mail
            if(!email.includes('@')) {
                msg.innerHTML = '<span class="text-red-400">Digite um e-mail válido!</span>';
                return;
            }

            btn.innerText = "Enviando...";
            btn.disabled = true;

            sendPasswordResetEmail(auth, email)
                .then(() => {
                    msg.innerHTML = '<span class="text-green-400">✅ E-mail de recuperação enviado! Verifique sua caixa de entrada (e spam).</span>';
                    document.getElementById('email').value = '';
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 5000);
                })
                .catch((error) => {
                    console.error(error);
                    
                    let mensagemErro = "Erro ao enviar e-mail. Tente novamente.";
                    
                    if(error.code === 'auth/user-not-found') {
                        mensagemErro = "E-mail não encontrado no sistema.";
                    } else if(error.code === 'auth/invalid-email') {
                        mensagemErro = "E-mail inválido.";
                    } else if(error.code === 'auth/too-many-requests') {
                        mensagemErro = "Muitas tentativas. Aguarde alguns minutos.";
                    }
                    
                    msg.innerHTML = `<span class="text-red-400">${mensagemErro}</span>`;
                    btn.innerText = "Enviar Link de Recuperação";
                    btn.disabled = false;
                });
        }

        // Permite enviar ao pressionar Enter
        document.getElementById('email').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                recuperarSenha();
            }
        });
    </script>
</body>
</html>
