<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cosmo Universidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-400 tracking-tighter">COSMO <span class="text-white font-light text-sm">UNIVERSIDADE</span></h1>
            <button onclick="sair()" class="bg-red-500/10 hover:bg-red-500 hover:text-white text-red-500 px-4 py-2 rounded-lg text-sm font-medium transition-all">
                Sair do Sistema
            </button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 mb-8 shadow-xl">
            <h2 class="text-sm font-bold text-indigo-400 uppercase mb-4">Postar Nova Atualização</h2>
            <textarea id="textoPost" placeholder="O que tem de novo hoje?" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:outline-none focus:border-indigo-500 mb-4 h-24 resize-none"></textarea>
            <button onclick="postar()" id="btnPostar" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl font-bold transition-all shadow-lg shadow-indigo-500/20">
                Publicar no Feed 🚀
            </button>
        </div>

        <div id="feed" class="space-y-4">
            <p class="text-center text-slate-500 animate-pulse">Carregando novidades...</p>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-cloud-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1rc6WLlLHvdizZmQB-FBzeAmbrz0jRFs",
            authDomain: "cosmo-universidade.firebaseapp.com",
            projectId: "cosmo-universidade",
            storageBucket: "cosmo-universidade.firebasestorage.app",
            messagingSenderId: "712049564091",
            appId: "1:712049564091:web:b7dc33e1978c0dec150c9e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. SEGURANÇA: Só entra se estiver logado
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        // 2. FUNÇÃO SAIR
        window.sair = function() {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        }

        // 3. POSTAR NO FEED
        window.postar = async function() {
            const texto = document.getElementById('textoPost').value;
            if(!texto) return;

            const btn = document.getElementById('btnPostar');
            btn.disabled = true;
            btn.innerText = "Publicando...";

            try {
                await addDoc(collection(db, "feed"), {
                    mensagem: texto,
                    data: serverTimestamp()
                });
                document.getElementById('textoPost').value = "";
            } catch (e) {
                alert("Erro ao postar: " + e);
            }
            btn.disabled = false;
            btn.innerText = "Publicar no Feed 🚀";
        }

        // 4. LER O FEED EM TEMPO REAL
        const q = query(collection(db, "feed"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const post = doc.data();
                const card = `
                    <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-800 shadow-sm transition-all hover:border-slate-700">
                        <p class="text-slate-200">${post.mensagem}</p>
                        <span class="text-[10px] text-slate-500 uppercase mt-4 block">Enviado agora mesmo</span>
                    </div>
                `;
                feedDiv.innerHTML += card;
            });

            if(snapshot.empty) {
                feedDiv.innerHTML = "<p class='text-center text-slate-600'>Nenhuma atualização ainda.</p>";
            }
        });
    </script>
</body>
</html>
