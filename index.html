<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cosmo Universidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold">C</div>
                <h1 class="text-xl font-bold tracking-tight text-white">COSMO <span class="text-indigo-400 font-light text-sm uppercase">Universidade</span></h1>
            </div>
            <button onclick="sair()" class="bg-slate-800 hover:bg-red-500 hover:text-white text-slate-300 px-4 py-2 rounded-xl text-sm font-semibold transition-all border border-slate-700">
                Sair
            </button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 mb-8 shadow-xl">
            <h2 class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-4">Novo Conteúdo</h2>
            
            <textarea id="textoPost" placeholder="O que vamos treinar hoje?" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white focus:outline-none focus:border-indigo-500 mb-4 h-24 resize-none"></textarea>
            
            <div class="flex items-center gap-3 mb-4">
                <button onclick="document.getElementById('inputFoto').click()" class="bg-slate-800 p-3 rounded-xl border border-slate-700 hover:text-indigo-400 transition-all">
                    📸 <span class="text-xs ml-2">Incluir Print/Foto</span>
                </button>
                <input type="file" id="inputFoto" class="hidden" accept="image/*">
                <span id="nomeArquivo" class="text-[10px] text-slate-500 italic">Nenhum arquivo...</span>
            </div>

            <div id="previewArea" class="hidden mb-4 relative">
                <img id="imgPreview" class="rounded-xl w-full max-h-60 object-cover border border-slate-700">
                <button onclick="limparFoto()" class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs">✕</button>
            </div>

            <button onclick="postar()" id="btnPostar" class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl font-bold transition-all shadow-lg shadow-indigo-500/20">
                Publicar Agora 🚀
            </button>
        </div>

        <div id="feed" class="space-y-6">
            <p class="text-center text-slate-600 animate-pulse">Carregando universidade...</p>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1rc6WLlLHvdizZmQB-FBzeAmbrz0jRFs",
            authDomain: "cosmo-universidade.firebaseapp.com",
            projectId: "cosmo-universidade",
            storageBucket: "cosmo-universidade.firebasestorage.app",
            messagingSenderId: "712049564091",
            appId: "1:712049564091:web:b7dc33e1978c0dec150c9e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let fotoBase64 = "";

        // Verificação de Login
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
        window.sair = () => signOut(auth).then(() => window.location.href = "login.html");

        // Lógica de Seleção de Foto (O Jeitinho!)
        const input = document.getElementById('inputFoto');
        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('nomeArquivo').innerText = file.name;
                const reader = new FileReader();
                reader.onload = (event) => {
                    fotoBase64 = event.target.result; // Aqui vira texto!
                    document.getElementById('imgPreview').src = fotoBase64;
                    document.getElementById('previewArea').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        window.limparFoto = () => {
            fotoBase64 = "";
            input.value = "";
            document.getElementById('previewArea').classList.add('hidden');
            document.getElementById('nomeArquivo').innerText = "Nenhum arquivo...";
        };

        // Postar (Tudo vai pro Firestore como texto)
        window.postar = async () => {
            const texto = document.getElementById('textoPost').value;
            if (!texto && !fotoBase64) return;

            const btn = document.getElementById('btnPostar');
            btn.disabled = true; btn.innerText = "Sincronizando...";

            try {
                await addDoc(collection(db, "feed"), {
                    mensagem: texto,
                    imagem: fotoBase64, // O "texto" da imagem vai aqui
                    data: serverTimestamp()
                });
                document.getElementById('textoPost').value = "";
                limparFoto();
            } catch (e) { alert("Erro ao postar! Tente uma imagem menor (print)."); }
            
            btn.disabled = false; btn.innerText = "Publicar Agora 🚀";
        };

        // Excluir
        window.excluir = async (id) => {
            if (confirm("Deseja apagar esse treinamento?")) await deleteDoc(doc(db, "feed", id));
        };

        // Feed em Tempo Real
        const q = query(collection(db, "feed"), orderBy("data", "desc"));
        onSnapshot(q, (snap) => {
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = "";
            snap.forEach((d) => {
                const p = d.data();
                const card = `
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl shadow-lg group">
                        <div class="flex justify-between mb-3">
                            <span class="text-[9px] text-slate-600 font-bold uppercase tracking-tighter">Cosmo Feed</span>
                            <button onclick="excluir('${d.id}')" class="text-slate-800 group-hover:text-red-500 transition-all text-xs">🗑️</button>
                        </div>
                        ${p.imagem ? `<img src="${p.imagem}" class="w-full rounded-2xl mb-4 border border-slate-800">` : ''}
                        <p class="text-slate-200 text-sm leading-relaxed">${p.mensagem}</p>
                    </div>
                `;
                feedDiv.innerHTML += card;
            });
            if(snap.empty) feedDiv.innerHTML = "<p class='text-center text-slate-700 text-xs'>Nenhum post ainda.</p>";
        });
    </script>
</body>
</html>
