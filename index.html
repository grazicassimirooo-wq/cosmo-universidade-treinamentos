<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cosmo Universidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold shadow-[0_0_15px_rgba(79,70,229,0.4)]">C</div>
                <h1 class="text-xl font-bold tracking-tight text-white italic">COSMO <span class="text-indigo-400 font-light text-sm uppercase tracking-widest ml-1">Universidade</span></h1>
            </div>
            <button onclick="sair()" class="bg-slate-800 hover:bg-red-500 hover:text-white text-slate-300 px-4 py-2 rounded-xl text-xs font-bold transition-all border border-slate-700 uppercase tracking-tighter">
                Sair
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl mb-12">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Novo Log de Bordo</h2>
            <textarea id="texto" placeholder="O que vamos treinar hoje?" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-slate-200 focus:outline-none focus:border-indigo-500 transition-all resize-none mb-4 h-24"></textarea>
            
            <div class="flex justify-between items-center gap-4">
                <input type="file" id="foto" accept="image/*" class="hidden" onchange="previewImagem(this)">
                <label for="foto" class="cursor-pointer bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-xl text-xs font-semibold transition-all flex items-center gap-2 border border-slate-700">
                    📷 Anexar Foto
                </label>
                <button onclick="postar()" id="btnPostar" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-2 rounded-xl text-xs font-bold transition-all shadow-lg uppercase tracking-widest">
                    Publicar
                </button>
            </div>
            <div id="previewContainer" class="hidden mt-4">
                <img id="imgPreview" class="w-20 h-20 object-cover rounded-lg border border-slate-700">
            </div>
        </div>

        <div class="relative">
            <div class="absolute left-4 top-0 h-full w-0.5 bg-slate-800/50"></div>
            
            <div id="feed" class="space-y-10">
                </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, deleteDoc, doc, updateDoc 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB1rc6WLlLHvdizZmQB-FBzeAmbrz0jRFs",
            authDomain: "cosmo-universidade.firebaseapp.com",
            projectId: "cosmo-universidade",
            storageBucket: "cosmo-universidade.firebasestorage.app",
            messagingSenderId: "712049564091",
            appId: "1:712049564091:web:b7dc33e1978c0dec150c9e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // VERIFICAÇÃO DE LOGIN
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
        });

        window.sair = () => signOut(auth);

        // LÓGICA DE IMAGEM
        let fotoBase64 = "";
        window.previewImagem = (input) => {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoBase64 = e.target.result;
                    document.getElementById('imgPreview').src = fotoBase64;
                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // POSTAR LOG (COM CAMPO CONCLUÍDO)
        window.postar = async () => {
            const texto = document.getElementById('texto').value;
            const btn = document.getElementById('btnPostar');

            if (!texto && !fotoBase64) return;

            btn.innerText = "Enviando...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "feed"), {
                    mensagem: texto,
                    imagem: fotoBase64,
                    data: serverTimestamp(),
                    concluido: false // Novo campo para o Check-in
                });
                document.getElementById('texto').value = "";
                document.getElementById('previewContainer').classList.add('hidden');
                fotoBase64 = "";
            } catch (e) {
                alert("Erro ao publicar.");
            } finally {
                btn.innerText = "Publicar";
                btn.disabled = false;
            }
        };

        // EXCLUIR LOG
        window.excluir = async (id) => {
            if (confirm("Deseja apagar este registro?")) await deleteDoc(doc(db, "feed", id));
        };

        // ALTERAR STATUS DE CONCLUSÃO (CHECK-IN)
        window.toggleCheck = async (id, statusAtual) => {
            try {
                await updateDoc(doc(db, "feed", id), {
                    concluido: !statusAtual
                });
            } catch (e) {
                console.error("Erro ao atualizar status:", e);
            }
        };

        // RENDERIZAÇÃO DA TIMELINE EM TEMPO REAL
        const q = query(collection(db, "feed"), orderBy("data", "desc"));
        onSnapshot(q, (snap) => {
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = "";
            
            snap.forEach((d) => {
                const p = d.data();
                const dataFormatada = p.data ? new Date(p.data.toDate()).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : 'Agora';
                
                const card = `
                    <div class="relative pl-12 group">
                        <div class="absolute left-[12px] top-2 w-3 h-3 rounded-full border-2 transition-all z-10 
                            ${p.concluido ? 'bg-indigo-500 border-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.6)]' : 'bg-slate-950 border-slate-700'}"></div>
                        
                        <div class="bg-slate-900 border ${p.concluido ? 'border-indigo-500/20' : 'border-slate-800'} p-6 rounded-3xl backdrop-blur-sm transition-all shadow-xl">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" ${p.concluido ? 'checked' : ''} 
                                           onclick="toggleCheck('${d.id}', ${p.concluido})"
                                           class="w-5 h-5 rounded-lg border-slate-700 bg-slate-800 text-indigo-500 focus:ring-indigo-500 cursor-pointer transition-all">
                                    <span class="text-[10px] font-mono text-slate-500 uppercase tracking-tighter">${dataFormatada} • LOG</span>
                                </div>
                                <button onclick="excluir('${d.id}')" class="text-slate-800 hover:text-red-500 transition-colors">🗑️</button>
                            </div>

                            ${p.imagem ? `<img src="${p.imagem}" class="w-full rounded-2xl mb-4 border border-slate-800 ${p.concluido ? 'grayscale opacity-30' : ''} transition-all shadow-inner">` : ''}
                            
                            <p class="text-sm leading-relaxed ${p.concluido ? 'text-slate-500 line-through' : 'text-slate-200'}">
                                ${p.mensagem}
                            </p>
                        </div>
                    </div>
                `;
                feedDiv.innerHTML += card;
            });
        });
    </script>
</body>
</html>
