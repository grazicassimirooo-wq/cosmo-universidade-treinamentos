<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cosmo Universidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/20">C</div>
                <h1 class="text-xl font-bold text-white tracking-tight">COSMO <span class="text-indigo-400 font-light">UNIVERSIDADE</span></h1>
            </div>
            <button onclick="sair()" class="bg-slate-800 hover:bg-red-500 hover:text-white text-slate-300 px-4 py-2 rounded-xl text-sm font-semibold transition-all border border-slate-700">
                Sair do Sistema
            </button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 mb-8 shadow-xl">
            <h2 class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-4">Nova Atualização</h2>
            <textarea id="textoPost" placeholder="O que você quer compartilhar com a equipe hoje?" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:outline-none focus:border-indigo-500 mb-4 h-28 resize-none transition-all"></textarea>
            <button onclick="postar()" id="btnPostar" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl font-bold transition-all shadow-lg shadow-indigo-500/30 active:scale-95">
                Publicar no Feed 🚀
            </button>
        </div>

        <div class="flex items-center gap-2 mb-4">
            <div class="h-[1px] bg-slate-800 flex-grow"></div>
            <span class="text-xs text-slate-500 font-bold uppercase tracking-widest">Feed de Treinamentos</span>
            <div class="h-[1px] bg-slate-800 flex-grow"></div>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-10">
                <p class="text-slate-500 animate-pulse">Sincronizando com a base de dados...</p>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Sua configuração oficial
        const firebaseConfig = {
            apiKey: "AIzaSyB1rc6WLlLHvdizZmQB-FBzeAmbrz0jRFs",
            authDomain: "cosmo-universidade.firebaseapp.com",
            projectId: "cosmo-universidade",
            storageBucket: "cosmo-universidade.firebasestorage.app",
            messagingSenderId: "712049564091",
            appId: "1:712049564091:web:b7dc33e1978c0dec150c9e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. SEGURANÇA: Se não estiver logado, tchau tchau!
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        // 2. FUNÇÃO SAIR (Desloga e volta pra porta)
        window.sair = function() {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        }

        // 3. FUNÇÃO POSTAR (Grava no Google)
        window.postar = async function() {
            const texto = document.getElementById('textoPost').value;
            if(!texto.trim()) return;

            const btn = document.getElementById('btnPostar');
            btn.disabled = true;
            btn.innerText = "Enviando para a nuvem...";

            try {
                await addDoc(collection(db, "feed"), {
                    mensagem: texto,
                    data: serverTimestamp()
                });
                document.getElementById('textoPost').value = "";
            } catch (e) {
                alert("Erro ao publicar! Verifique se ativou o Modo de Teste no Firestore.");
                console.error(e);
            }
            btn.disabled = false;
            btn.innerText = "Publicar no Feed 🚀";
        }

        // 4. LER O FEED EM TEMPO REAL (A mágica acontece aqui)
        const q = query(collection(db, "feed"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const post = doc.data();
                // Criando o cartão da mensagem
                const card = `
                    <div class="bg-slate-900/60 p-5 rounded-2xl border border-slate-800 shadow-sm transition-all hover:border-indigo-500/30 group">
                        <p class="text-slate-200 leading-relaxed">${post.mensagem}</p>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Universidade Cosmo • Feed</span>
                            <span class="text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-1 rounded">MENSAGEM AO VIVO</span>
                        </div>
                    </div>
                `;
                feedDiv.innerHTML += card;
            });

            if(snapshot.empty) {
                feedDiv.innerHTML = "<p class='text-center text-slate-600 py-10'>Ainda não temos treinamentos postados.</p>";
            }
        }, (error) => {
            feedDiv.innerHTML = "<p class='text-red-400 text-center text-sm'>Erro de conexão com o Banco de Dados.</p>";
        });
    </script>
</body>
</html>
